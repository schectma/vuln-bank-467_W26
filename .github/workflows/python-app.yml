 # This workflow will install Python dependencies, run tests and lint with a single version of Python
 # For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
 name: Python application
  
 on: [push, pull_request]
  
 permissions:
   contents: read
 
 jobs:
   build:
 
     runs-on: ubuntu-latest
     services:
     # Needed for SQLi testing as there needs to be database entries.
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: app_test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
 
     steps:
     - uses: actions/checkout@v4
     - name: Set up Python 3.10
       uses: actions/setup-python@v4
       with:
         python-version: "3.10"
     - name: Install dependencies
       run: |
         python -m pip install --upgrade pip
         pip install flake8
         if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
     - name: Lint with flake8
       run: |
         # stop the build if there are Python syntax errors or undefined names
         flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=app.py,auth.py,database.py,ai_agent_deepseek.py
         # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
         flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude=app.py,auth.py,database.py,ai_agent_deepseek.py
    #  - name: Test with Unittest
    #    run: |
    #      python tests.py
      - name: Install test dependencies
        run: |
          pip install pytest
      - name: Test with Unittest
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/app_test_db
        run: |
          # Run tests written by team to make sure no existing features are broken by new code
          pytest -v
