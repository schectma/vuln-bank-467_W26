<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Demo Control Panel - Vulnerable Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .back-button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .back-button:hover {
            background: #5568d3;
        }

        .instructions {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .instructions h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .instructions ul {
            color: #856404;
            margin-left: 20px;
        }

        .instructions li {
            margin: 5px 0;
        }

        .status-banner {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-item {
            text-align: center;
        }

        .status-count {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .status-count.vulnerable {
            color: #dc3545;
        }

        .status-count.protected {
            color: #28a745;
        }

        .status-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vulnerabilities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 25px;
        }

        .vuln-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .vuln-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .vuln-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .vuln-title {
            flex: 1;
        }

        .vuln-title h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .vuln-cwe {
            display: inline-block;
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-badge.vulnerable {
            background: #dc3545;
            color: white;
        }

        .status-badge.protected {
            background: #28a745;
            color: white;
        }

        .vuln-description {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .test-scenario {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 3px;
        }

        .test-scenario h4 {
            color: #667eea;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .test-scenario p {
            color: #555;
            font-size: 13px;
            line-height: 1.5;
        }

        .test-scenario code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }

        .endpoints {
            margin-top: 10px;
        }

        .endpoint-tag {
            display: inline-block;
            background: #e9ecef;
            padding: 4px 8px;
            margin: 4px 4px 4px 0;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
            color: #495057;
        }

        .note {
            background: #d1ecf1;
            border-left: 3px solid #17a2b8;
            padding: 10px;
            margin-top: 15px;
            border-radius: 3px;
            font-size: 13px;
            color: #0c5460;
        }

        .footer {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .footer p {
            color: #666;
            font-size: 14px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .vulnerabilities-grid {
                grid-template-columns: 1fr;
            }

            .status-banner {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Vulnerable Bank - Security Status Dashboard</h1>
            <p>Live monitoring of vulnerability protection states.</p>
            <a href="/dashboard" class="back-button">← Back to Dashboard</a>
        </div>

        <div class="status-banner">
            <div class="status-item">
                <div class="status-count vulnerable" id="vulnerable-count">0</div>
                <div class="status-label">Vulnerable</div>
            </div>
            <div class="status-item">
                <div class="status-count protected" id="protected-count">0</div>
                <div class="status-label">Protected</div>
            </div>
            <div class="status-item">
                <div class="status-count" style="color: #667eea;" id="total-count">10</div>
                <div class="status-label">Total Checks</div>
            </div>
        </div>

        <div class="vulnerabilities-grid" id="vulnerabilities-grid">
            <!-- Vulnerability cards will be dynamically inserted here -->
        </div>
    </div>

    <script>
        // Vulnerability definitions - minimal info, see DOCS/ for details
        const vulnerabilities = [
            {
                id: 'xss_protection_enabled',
                title: 'Cross-Site Scripting (XSS)'
            },
            {
                id: 'security_hardening_enabled',
                title: 'Security Misconfiguration'
            },
            {
                id: 'sql_injection_protection',
                title: 'SQL Injection'
            },
            {
                id: 'authorization_enabled',
                title: 'Broken Authorization (BOLA)'
            },
            {
                id: 'information_disclosure_protection',
                title: 'Information Disclosure'
            },
            {
                id: 'mass_assignment_protection',
                title: 'Mass Assignment'
            },
            {
                id: 'ssrf_protection',
                title: 'Server-Side Request Forgery (SSRF)'
            },
            {
                id: 'password_hashing_enabled',
                title: 'Weak Password Storage'
            },
            {
                id: 'file_upload_validation',
                title: 'Unrestricted File Upload'
            },
            {
                id: 'ai_prompt_injection_protection',
                title: 'AI Prompt Injection'
            }
        ];

        // Load security configuration and render vulnerability cards
        async function loadSecurityStatus() {
            try {
                const response = await fetch('/api/security-config');
                const config = await response.json();

                renderVulnerabilityCards(config);
                updateStatusCounts(config);
            } catch (error) {
                console.error('Failed to load security configuration:', error);
            }
        }

        function renderVulnerabilityCards(config) {
            const grid = document.getElementById('vulnerabilities-grid');
            grid.innerHTML = '';

            vulnerabilities.forEach(vuln => {
                const isProtected = config[vuln.id];
                const card = createVulnerabilityCard(vuln, isProtected);
                grid.appendChild(card);
            });
        }

        function createVulnerabilityCard(vuln, isProtected) {
            const card = document.createElement('div');
            card.className = 'vuln-card';

            const statusBadge = `<span class="status-badge ${isProtected ? 'protected' : 'vulnerable'}">
                ${isProtected ? '✓ Protected' : '⚠ Vulnerable'}
            </span>`;

            card.innerHTML = `
                <div class="vuln-header">
                    <div class="vuln-title">
                        <h3>${vuln.title}</h3>
                    </div>
                    ${statusBadge}
                </div>
            `;

            return card;
        }

        function updateStatusCounts(config) {
            let vulnerableCount = 0;
            let protectedCount = 0;

            Object.values(config).forEach(isProtected => {
                if (isProtected) {
                    protectedCount++;
                } else {
                    vulnerableCount++;
                }
            });

            document.getElementById('vulnerable-count').textContent = vulnerableCount;
            document.getElementById('protected-count').textContent = protectedCount;
        }

        // Load status on page load
        document.addEventListener('DOMContentLoaded', loadSecurityStatus);
    </script>
</body>
</html>
